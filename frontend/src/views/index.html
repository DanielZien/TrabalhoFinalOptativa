<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Flow Web Site</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Minhas config de Style -->
    <link rel="stylesheet" href="/src/styles/style.css">
</head>

<body class="bg-white">

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-3 col-lg-2 d-none d-md-block sidebar p-3">
                <h4 class="mb-4 text-center mt-2 fw-bold text-dark">EventFlow</h4>
                <a href="index.html" class="bg-light fw-bold"><i class="bi bi-house-door me-2"></i> Home</a>
                <a href="registro.html"><i class="bi bi-person-plus me-2"></i> Novo Usuário</a>
                <a href="login.html"><i class="bi bi-box-arrow-in-right me-2"></i> Login</a>
            </nav>

            <main class="col-md-9 col-lg-6 mx-auto p-3 p-md-5">
                
                <h5 class="text-center mb-3"><strong>Explore</strong> <span class="fw-normal text-muted">os Eventos</span></h5>

                <div class="input-group mb-4 shadow-sm" style="border-radius: 20px; overflow: hidden;">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control search-bar bg-light ps-0" placeholder="Pesquise Eventos, Show e etc..">
                </div>

                
                <hr style="border-top: 2px solid #eee;">

                <div class="map-banner mb-2 d-flex justify-content-center align-items-center shadow-sm">
                    <button class="btn btn-light map-btn shadow-sm px-4 py-2">
                        Explore pelo Mapa <i class="bi bi-geo-alt-fill text-secondary"></i>
                    </button>
                </div>

                <p class="text-center text-muted small mb-4">Mostrando <strong id="qtd-mostrando text-dark">0</strong> de <strong id="qtd-total text-dark">0</strong> Eventos</p>
                
                <div id="lista-eventos" class="row g-4 ">
                    </div>

            </main>
        </div>
    </div>

    <script src="/src/config/api.js"></script>
    <script src="/src/models/EventModel.js"></script>
    <script src="/src/controllers/EventController.js"></script>
</body>

</html>
