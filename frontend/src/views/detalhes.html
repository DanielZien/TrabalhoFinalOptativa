<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="index.html">
                <i class="bi bi-arrow-left me-2"></i> EventFlow
            </a>
            <span class="navbar-text fw-bold">Sobre o Evento</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Carregando detalhes...</p>
        </div>

        <div id="conteudo-evento" class="row g-4 d-none">
            
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 mb-4 rounded-4">
                    <h2 id="detalhe-titulo" class="fw-bold mb-3">Título Carregando...</h2>
                    <p class="text-muted mb-4"><i class="bi bi-calendar-event me-2"></i> <span id="detalhe-data">--/--/----</span></p>
                    
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Descrição</h5>
                    <p id="detalhe-descricao" class="text-muted" style="white-space: pre-wrap;">Carregando...</p>
                    
                    <h5 class="fw-bold border-bottom pb-2 mt-4 mb-3">Informações do Organizador</h5>
                    <ul class="list-unstyled text-muted">
                        <li class="mb-2"><i class="bi bi-person-fill text-primary me-2"></i> <span id="org-nome">--</span></li>
                        <li class="mb-2"><i class="bi bi-envelope-fill text-primary me-2"></i> <span id="org-email">--</span></li>
                        <li class="mb-2"><i class="bi bi-telephone-fill text-primary me-2"></i> <span id="org-telefone">--</span></li>
                    </ul>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 position-sticky" style="top: 20px;">
                    <div id="mapa-container" class="w-100" style="height: 250px; background-color: #eee; border-top-left-radius: 1rem; border-top-right-radius: 1rem; overflow: hidden;">
                        </div>
                    
                    <div class="card-body p-4">
                        <p class="text-muted small mb-1"><i class="bi bi-geo-alt-fill text-danger"></i> Localização:</p>
                        <p id="detalhe-local" class="fw-bold small mb-4">Carregando endereço...</p>
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-muted">Valor Ingresso</span>
                            <h4 id="detalhe-preco" class="fw-bold text-dark mb-0">R$ --</h4>
                        </div>
                        <button class="btn w-100 fw-bold py-2" style="background-color: #0b0080; color: white; border-radius: 20px;">
                            Obter Ingresso
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="/src/config/api.js"></script>
    <script src="/src/models/EventModel.js"></script>
    <script src="/src/controllers/DetalhesController.js"></script>
</body>
</html>
