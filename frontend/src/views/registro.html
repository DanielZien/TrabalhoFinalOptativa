<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Evento - EventFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="index.html"> Voltar</a>
            <span class="navbar-text fw-bold">Criar Novo Evento</span>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 800px;">
        <div class="card border-0 shadow-sm p-4 rounded-4">
            <form id="form-registro-evento">
                
                <h5 class="mb-3 fw-bold">Informações Básicas</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <label>Título do Evento *</label>
                        <input type="text" id="reg-titulo" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Categoria *</label>
                        <select id="reg-categoria" class="form-select" required>
                            <option value="Palestra">Palestra</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Show">Show</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label>Descrição *</label>
                        <textarea id="reg-descricao" class="form-control" rows="3" required></textarea>
                    </div>
                </div>

                <!-- As imagens -->
                 <h5 class="mb-3 mt-4 fw-bold">Imagens do Evento</h5>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label>Selecione até 4 imagens (A primeira será a capa) *</label>
                        <input type="file" id="reg-imagens" class="form-control" accept="image/png, image/jpeg, image/jpg" multiple required>
                        <div id="preview-imagens" class="d-flex gap-2 mt-3 flex-wrap"></div>
                    </div>
                </div>

                <h5 class="mb-3 fw-bold">Data, Hora e Ingresso</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label>Data *</label>
                        <input type="date" id="reg-data" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Hora Início *</label>
                        <input type="time" id="reg-hora-inicio" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Hora Fim *</label>
                        <input type="time" id="reg-hora-fim" class="form-control" required>
                    </div>
                    <div class="col-md-4 mt-3">
                        <label>Preço (R$) *</label>
                        <input type="number" id="reg-preco" class="form-control" step="0.01" min="0" value="0" required>
                        <small class="text-muted">Deixe 0 para Gratuito</small>
                    </div>
                </div>

                <h5 class="mb-3 fw-bold">Localização (ViaCEP)</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label>CEP *</label>
                        <input type="text" id="reg-cep" class="form-control" placeholder="00000-000" required>
                    </div>
                    <div class="col-md-6">
                        <label>Rua/Avenida</label>
                        <input type="text" id="reg-rua" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label>Número *</label>
                        <input type="text" id="reg-numero" class="form-control" required>
                    </div>
                    <div class="col-md-5">
                        <label>Bairro</label>
                        <input type="text" id="reg-bairro" class="form-control" required>
                    </div>
                    <div class="col-md-5">
                        <label>Cidade</label>
                        <input type="text" id="reg-cidade" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label>UF</label>
                        <input type="text" id="reg-uf" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn w-100 fw-bold py-2 text-white" id="btn-salvar" style="background-color: #0b0080; border-radius: 8px;">
                    Salvar Evento
                </button>
            </form>
        </div>
    </div>

    <script src="/src/config/api.js"></script>
    <script src="/src/models/EventModel.js"></script>
    <script src="/src/controllers/RegistroController.js"></script>
</body>
</html>
