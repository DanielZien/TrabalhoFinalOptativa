<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Flow | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/src/styles/loginStyle.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg login-card p-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark"><i class="bi bi-calendar2-event text-primary"></i> EventFlow</h3>
            <p class="text-muted">Faça login para continuar</p>
        </div>

        <div id="msg-erro" class="alert alert-danger d-none text-center" role="alert"></div>

        <form id="form-login">
            <div class="mb-3">
                <label for="email" class="form-label text-muted small fw-bold">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="seu@email.com">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="senha" class="form-label text-muted small fw-bold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="senha" placeholder="********">
                </div>
            </div>

            <button type="submit" class="btn btn-custom-blue w-100 py-2 fw-bold">Entrar</button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">Ainda não tem conta? <a href="registro.html" class="text-decoration-none fw-bold" style="color: #0b0080;">Cadastre-se</a></p>
            <a href="index.html" class="small text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Voltar para Home</a>
        </div>
    </div>

    <script src="/src/models/UserModel.js"></script>
    <script src="/src/controllers/LoginController.js"></script>
    <script src="/src/config/api.js"></script>
</body>
</html>
